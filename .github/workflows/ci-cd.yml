name: MallVision CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # =========================
  # 🧠 Backend (FastAPI)
  # =========================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./age-gender-backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-base.txt
          pip install -r requirements-ai.txt

      - name: 🔍 Lint (optional but recommended)
        run: |
          pip install flake8
          flake8 . || true

      - name: 🧪 Run tests
        run: |
          pip install pytest
          pytest || true

      - name: ⚙️ Check FastAPI app startup
        run: |
          python -c "from main import app; print('FastAPI app loaded successfully')"


  # =========================
  # ⚛️ Frontend (React)
  # =========================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install dependencies
        working-directory: ./balloon-game   # ⚠️ adjust if needed
        run: npm install

      - name: 🧪 Run tests
        working-directory: ./balloon-game
        run: npm test -- --watchAll=false || true

      - name: 🏗️ Build frontend
        working-directory: ./balloon-game
        run: npm run build


  # =========================
  # 🐳 Optional Docker Build
  # =========================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: |
          docker build -t mallvision-app .

      # Optional: Push to Docker Hub
      # - name: 🔐 Login to DockerHub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

      # - name: 🚀 Push image
      #   run: |
      #     docker tag mallvision-app yourusername/mallvision:latest
      #     docker push yourusername/mallvision:latest